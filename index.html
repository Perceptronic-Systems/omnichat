<!DOCTYPE html>
<html>

<head>
    <title>omnichat</title>
    <link rel="stylesheet" href="./src/stylesheet.css">
</head>


<body>
    
    <div id="header">
        <h1>omnichat</h1>
        <button id="taskbar-file">File</button>
        <button id="taskbar-edit">Edit</button>
        <button id="taskbar-view">View</button>
        <button id="taskbar-help">Help</button>
    </div>

    <div id="toolbar">
        <button id="schedule">S</button>
        <button id="tool-calls">T</button>
        <button id="knowledge-base">K</button>
        <button id="graph">G</button>
        <button id="console">C</button>
    </div>

    <div id="chat-history" class="section">
        <h3>this is the beginning of your conversation with omnichat</h3>
        <div id="eoc-spacer"></div>
    </div>
    
    <div id="user-input" class="section">
        <textarea id="input-field"></textarea>
        <button id="send-button">Send</button>
    </div>

    <script type="module" src="./src/omnichat.js"></script>
    <script type="module" src="./src/app.js"></script>
</body>

</html>
