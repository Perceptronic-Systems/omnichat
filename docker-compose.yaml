services:
  omnichat-backend:
    build: .
    container_name: omnichat-backend
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=http://ollama-service:11434
    ports:
      - "5014:5014"
    networks:
      - omnichat_net

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-service
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - omnichat_net

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./omnichat-nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount your self-signed certs here:
      - /etc/ssl/local-certs:/etc/ssl/local-certs:ro
    networks:
      - omnichat_net

volumes:
  ollama_data:

networks:
  omnichat_net:
    driver: bridge
    name: omnichat_net